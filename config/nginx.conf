# ── Rate-limit zones ──────────────────────────────────────────────────────────
# (these must be in http {} context – if using nginx.conf directly, move there)
limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=api:10m   rate=30r/m;
limit_req_zone $binary_remote_addr zone=global:10m rate=100r/m;

server {
    listen 80;
    server_name _;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options            "DENY"                    always;
    add_header X-Content-Type-Options     "nosniff"                 always;
    add_header X-XSS-Protection           "1; mode=block"           always;
    add_header Referrer-Policy            "no-referrer-when-downgrade" always;
    add_header Permissions-Policy         "geolocation=(),camera=(),microphone=()" always;
    add_header Content-Security-Policy
        "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://fonts.googleapis.com; img-src 'self' data: https:; font-src 'self' https://cdn.jsdelivr.net https://fonts.gstatic.com; connect-src 'self';" always;

    # ── HTTPS redirect (when TLS is terminated at ALB, this block is unused) ──
    # Uncomment if running TLS directly on Nginx:
    # return 301 https://$host$request_uri;

    # ── HSTS (only effective over HTTPS) ─────────────────────────────────────
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Global rate limit ─────────────────────────────────────────────────────
    limit_req zone=global burst=20 nodelay;

    # ── Login/register endpoints – strict limiting ────────────────────────────
    location ~* ^/auth/(login|register) {
        limit_req zone=login burst=5 nodelay;
        proxy_pass         http://app:5000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Static files served directly ─────────────────────────────────────
    location /static/ {
        alias /app/app/static/;
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Pragma "no-cache";
    }

    # ── Health check (no rate limit) ─────────────────────────────────────────
    location = /health {
        proxy_pass         http://app:5000;
        proxy_set_header   Host              $host;
        access_log off;
    }

    # ── All other requests ────────────────────────────────────────────────────
    location / {
        limit_req zone=api burst=15 nodelay;
        proxy_pass         http://app:5000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout    30s;
        proxy_send_timeout    30s;

        # Max upload size (product images)
        client_max_body_size 6M;
    }

    # ── Block common attack patterns ──────────────────────────────────────────
    location ~* \.(sql|bash|sh|py|php|env)$ { return 404; }
    location ~* /\.(htaccess|git|env)       { return 404; }

    # ── Log format ────────────────────────────────────────────────────────────
    access_log /var/log/nginx/access.log combined;
    error_log  /var/log/nginx/error.log warn;
}

