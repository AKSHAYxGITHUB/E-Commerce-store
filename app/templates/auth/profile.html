{% extends "base.html" %}
{% block title %}My Profile{% endblock %}

{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card shadow-sm border-0">
        <div class="card-body p-4">
          <h4 class="fw-bold mb-4"><i class="bi bi-person-circle text-warning"></i> My Profile</h4>
          <dl class="row">
            <dt class="col-sm-4">Name</dt><dd class="col-sm-8">{{ user.name }}</dd>
            <dt class="col-sm-4">Email</dt><dd class="col-sm-8">{{ user.email }}</dd>
            <dt class="col-sm-4">Role</dt>
            <dd class="col-sm-8">
              <span class="badge bg-{{ 'danger' if user.is_admin() else 'primary' }}">{{ user.role.title() }}</span>
            </dd>
            <dt class="col-sm-4">Joined</dt><dd class="col-sm-8">{{ user.created_at.strftime('%d %b %Y') }}</dd>
          </dl>
          <div class="d-flex gap-2 mt-3">
            <a href="{{ url_for('store.orders') }}" class="btn btn-outline-primary btn-sm">My Orders</a>
            <form method="POST" action="{{ url_for('auth.logout') }}" class="d-inline">
              <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
              <button type="submit" class="btn btn-outline-danger btn-sm">Logout</button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
