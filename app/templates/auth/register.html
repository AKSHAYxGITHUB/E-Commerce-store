{% extends "base.html" %}
{% block title %}Create Account{% endblock %}

{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card shadow-sm border-0">
        <div class="card-body p-4">
          <h3 class="card-title mb-4 text-center fw-bold">
            <i class="bi bi-person-plus-fill text-warning"></i> Create Account
          </h3>
          <form method="POST" action="{{ url_for('auth.register') }}" novalidate>
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
            <div class="mb-3">
              <label class="form-label fw-semibold">Full Name</label>
              <input type="text" name="name" class="form-control"
                     value="{{ name|default('') }}" required minlength="2" />
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold">Email address</label>
              <input type="email" name="email" class="form-control"
                     value="{{ email|default('') }}" required autocomplete="email" />
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold">Password</label>
              <input type="password" name="password" id="pw" class="form-control"
                     required minlength="8" autocomplete="new-password" />
              <div class="form-text">Min 8 chars, one uppercase, one number.</div>
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold">Confirm Password</label>
              <input type="password" name="confirm_password" id="pw2" class="form-control"
                     required autocomplete="new-password" />
            </div>
            <div class="d-grid mt-4">
              <button type="submit" class="btn btn-warning fw-bold">Create Account</button>
            </div>
          </form>
          <p class="text-center mt-3 mb-0 small">
            Already have an account? <a href="{{ url_for('auth.login') }}">Login</a>
          </p>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
