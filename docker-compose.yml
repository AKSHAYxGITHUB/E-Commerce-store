version: "3.9"

services:
  # ── Flask app ───────────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: ecommerce_app
    restart: unless-stopped
    env_file: .env
    environment:
      FLASK_ENV: development
      DATABASE_URL: postgresql://ecomuser:ecompass@db:5432/ecommerce_db
    ports:
      - "5000:5000"
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
    networks:
      - ecom_net

  # ── PostgreSQL database ────────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: ecommerce_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ecommerce_db
      POSTGRES_USER: ecomuser
      POSTGRES_PASSWORD: ecompass
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "ecomuser", "-d", "ecommerce_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ecom_net

  # ── Nginx reverse proxy ─────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: ecommerce_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./config/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./app/static:/app/app/static:ro
    depends_on:
      - app
    networks:
      - ecom_net

volumes:
  db_data:

networks:
  ecom_net:
    driver: bridge
